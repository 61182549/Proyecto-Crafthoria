<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crafthoria - Contacto</title>
  <link rel="stylesheet" href="stylesContacto.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="header">
    <h1>Crafthoria</h1>
    <div class="nav">
     <a href="../INICIO/inicio.html">Inicio</a>
     <a href="../PRODUCTOS/productos.html">Productos</a>
     <a href="../PERSONALIZACION/personalizacion.html">Personalización</a>
     <a href="../BLOG/blog.html">Blog</a>
    <a href="../CONTACTOS/contacto.html">Contactos</a>
    </div>
  </div>

  <div class="contact-container">
    <h2>¿Tienes dudas? ¡Escríbenos!</h2>
    <form id="formulario-contacto">
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" placeholder="Tu nombre completo" required>

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="tu@correo.com" required>

      <label for="asunto">Asunto</label>
      <input type="text" id="asunto" placeholder="Motivo del mensaje" required>

      <label for="mensaje">Mensaje</label>
      <textarea id="mensaje" placeholder="Escribe tu mensaje aquí..." required></textarea>

      <button type="submit">Enviar mensaje</button>
    </form>

    <div id="respuesta"></div>
  </div>

  <script src="contacto.js" defer></script>
</body>
</html>
